# qq only-down ratchet baseline state.
#
# Increasing a *_budget value, or changing any scope, match kind, or pattern,
# requires an operator-approved commit. Agent runs of `tools/ratchet.sh update`
# may only lower budgets to freshly measured values.
#
# Check mode intentionally requires exact equality. A lower measurement is an
# improvement, but its Change must run update and commit the lowered baseline.

# Aggregate `LC_ALL=C wc -w` total across the mandatory-read set. The glob is
# part of the scope so a newly added Skill is included automatically.
prose_words_paths=(
  'AGENTS.md'
  'CONCEPTS.md'
  'REVIEW.md'
  'skills/*/SKILL.md'
  'backlog/docs/doc-48 - Conventions-—-board-hygiene-Task-vocabulary-board-deep-links.md'
)
prose_words_budget=11658

# Fixed-string occurrences under skills/.
codex_exec_scope='skills/'
codex_exec_match_kind='fixed'
codex_exec_pattern='codex exec'
codex_exec_budget=9

# Extended-regex occurrences of vendor CLI/config tokens under skills/.
runtime_specific_flags_scope='skills/'
runtime_specific_flags_match_kind='extended-regex'
runtime_specific_flags_pattern='--sandbox|--skip-git-repo-check|--profile|mcp_servers|skills\.bundled|skills\.include_instructions'
runtime_specific_flags_budget=14

# Extended-regex occurrences of shell-parser library names under bin/.
shell_parser_idioms_scope='bin/'
shell_parser_idioms_match_kind='extended-regex'
shell_parser_idioms_pattern='shlex|bashlex'
shell_parser_idioms_budget=5
