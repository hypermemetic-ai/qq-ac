# qq's merge gate — externally owned (MIT: kunchenguid/no-mistakes).
# One landing path: the landing agent drives the gate (`no-mistakes axi run
# --intent "<task + AC>"`, adding `--skip ci` only after confirming no CI);
# `git push no-mistakes <branch>` is a fallback only when no skip flags are
# needed. The independent pipeline validates review/test/lint/docs, and the work
# lands as a PR a human merges. Trivial fixes batch on a branch; nothing commits
# straight to main.
#
# NOTE: `agent` + `commands` are read from the DEFAULT BRANCH (a no-mistakes security
# rule), so changes to those executable keys only take effect once committed to
# main. Branch-effective fields below are read from the pushed branch.
# Ref: https://kunchenguid.github.io/no-mistakes/reference/repo-config/
agent: codex          # gate's pipeline stages run on gpt-5.5 (via ~/.codex/config.toml), not Opus
commands:
  lint: "shellcheck bin/qq-wip bin/qq-wip-snapshot.sh bin/qq-activate.sh bin/install.sh bin/qq-phase bin/qq-registry-check.sh bin/qq-openwiki-refresh"
  format: "bin/qq-openwiki-refresh"   # refresh openwiki/ inside the landing transaction (guarded no-op until adopted+keyed)
  test: "bash -c 'set -euo pipefail; git show refs/remotes/origin/main:bin/qq-registry-check.sh | bash'"    # refuse a landing that doesn't touch the intent registry (backlog/)
ignore_patterns:
  - "openwiki/**"   # regenerated by commands.format inside the same transaction — review/document would be reading the gate's own exhaust
auto_fix:
  review: 3         # fire-and-forget: objective review findings fix themselves; `ask-user` findings still park for the landing agent to relay (operator decision, 2026-07-08)
intent:
  enabled: true     # fallback only — landings pass explicit intent via `no-mistakes axi run --intent`, plus `--skip ci` only when no CI exists
test:
  evidence:
    store_in_repo: false  # keep the evidence trail out of the working tree
