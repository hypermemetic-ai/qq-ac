name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node 22.22.3
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.3
      - name: Install Pi 0.80.10 for extension checks
        shell: bash
        run: |
          npm install --prefix "$RUNNER_TEMP/qq-pi" --no-save --ignore-scripts \
            @earendil-works/pi-coding-agent@0.80.10
          echo "$RUNNER_TEMP/qq-pi/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Run shell tests
        shell: bash
        run: |
          set -euo pipefail
          for test_script in tests/test-*.sh; do
            bash "$test_script"
          done
      - name: Install Landstrip 0.17.31
        shell: bash
        run: >-
          npm install --prefix "$RUNNER_TEMP/qq-landstrip"
          --no-save --ignore-scripts @landstrip/landstrip-linux-x64@0.17.31
      - name: Run native delegate enforcement test
        shell: bash
        env:
          QQ_LANDSTRIP_BIN: ${{ runner.temp }}/qq-landstrip/node_modules/@landstrip/landstrip-linux-x64/bin/landstrip
        run: bash tests/test-qq-delegate-enforcement.sh
