onboarding = false
[theme]
name = "tokyo-night"
auto_switch = false

[keys]
switch_workspace = "prefix+1..9"
focus_agent = "prefix+alt+1..9"

# Direct (no-prefix) navigation. Direct bindings are intercepted by herdr,
# so pane apps never see these keys.
previous_workspace = "alt+up"
next_workspace = "alt+down"
previous_tab = "alt+left"
next_tab = "alt+right"
# alt+o is bound below as a keys.command: qq-herdr-snap prefers the Repository
# project-home pi orchestrator; pressing it again there bounces back.

# Inverted j/k (operator preference): j = up, k = down — both for pane
# focus and inside navigate mode. h/l unchanged.
focus_pane_up = "prefix+j"
focus_pane_down = "prefix+k"
navigate_pane_up = "j"
navigate_pane_down = "k"

# File navigation opens as a session-modal popup (herdr 0.7.4) so the tiled
# layout never reflows; quitting the browser closes the popup (yazi's `!`
# still opens a shell in place when one is wanted). Fixed cell size with a
# matching stty preamble works around herdr 0.7.4 never setting the popup
# PTY winsize: the frame draws at the configured size while the PTY stays
# at 24x80 (probed 2026-07-15; no fix on upstream master). The stty values
# are the frame minus its border; keep the pairs in sync. 74x29 was tuned
# live by the operator against the measured 104x33 tiled area (frames wider
# than the tiled panel clamp and smear). Percent sizing can return when
# upstream fixes the winsize.
[[keys.command]]
key = "prefix+f"
type = "popup"
command = "bash -ic 'stty cols 72 rows 27 2>/dev/null; qqy'"
description = "yazi at the focused space's project folder"
width = 74
height = 29

[[keys.command]]
key = "prefix+shift+f"
type = "popup"
command = "bash -ic 'stty cols 72 rows 27 2>/dev/null; qqbr'"
description = "broot at the focused space's project folder"
width = 74
height = 29

# Snap to Repository project-home pi, its claude fallback, then focused-space
# pi, claude, or the first agent in sidebar order; press again there to bounce
# back to where you came from.
[[keys.command]]
key = "alt+o"
type = "shell"
command = "qq-herdr-snap"

# Pull an agent into the focused pane, replacing it (the mirror of
# focus_agent = prefix+alt+N, which jumps you *to* agent N). prefix+F<N> moves
# agent N into your tab and closes the pane you were in, so the agent takes its
# place; prefix+0 pulls whoever most needs attention. (F-keys, not shift+digit,
# because shift+digit doesn't register on this terminal.)
# type = "shell" runs the helper detached — no visible command pane.
[[keys.command]]
key = "prefix+0"
type = "shell"
command = "qq-herdr-pull next"

[[keys.command]]
key = "prefix+f1"
type = "shell"
command = "qq-herdr-pull 1"

[[keys.command]]
key = "prefix+f2"
type = "shell"
command = "qq-herdr-pull 2"

[[keys.command]]
key = "prefix+f3"
type = "shell"
command = "qq-herdr-pull 3"

[[keys.command]]
key = "prefix+f4"
type = "shell"
command = "qq-herdr-pull 4"

[[keys.command]]
key = "prefix+f5"
type = "shell"
command = "qq-herdr-pull 5"

[[keys.command]]
key = "prefix+f6"
type = "shell"
command = "qq-herdr-pull 6"

[[keys.command]]
key = "prefix+f7"
type = "shell"
command = "qq-herdr-pull 7"

[[keys.command]]
key = "prefix+f8"
type = "shell"
command = "qq-herdr-pull 8"

[[keys.command]]
key = "prefix+f9"
type = "shell"
command = "qq-herdr-pull 9"

[ui]
agent_panel_sort = "spaces"

# Delegate status surface, ambient tier (doc-43 round 2). The $stage token
# row renders stage-boundary one-liners reported with
# `herdr workspace report-metadata` (Space rows) and
# `herdr pane report-metadata` (Agent rows). Unreported tokens collapse, so
# these rows cost nothing outside an active batch. Rows above $stage are
# herdr's defaults, restated because an explicit layout replaces them.
show_agent_labels_on_pane_borders = false
[ui.sidebar.spaces]
rows = [
  ["state_icon", "workspace"],
  ["branch", "git_status"],
  ["$stage"],
]

[ui.sidebar.agents]
rows = [
  ["state_icon", "workspace", "tab"],
  ["agent"],
  ["$stage"],
]

[ui.toast]
delivery = "herdr"

[experimental]
switch_ascii_input_source_in_prefix = false
