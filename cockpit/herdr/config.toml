onboarding = false
[theme]
name = "tokyo-night"
auto_switch = false

[keys]
switch_workspace = "prefix+1..9"
focus_agent = "prefix+alt+1..9"

[[keys.command]]
key = "prefix+f"
type = "pane"
command = "bash -ic 'qqy; exec bash -i'"

[[keys.command]]
key = "prefix+shift+f"
type = "pane"
command = "bash -ic 'qqbr; exec bash -i'"

# Pull an agent into the focused pane, replacing it (the mirror of
# focus_agent = prefix+alt+N, which jumps you *to* agent N). prefix+F<N> moves
# agent N into your tab and closes the pane you were in, so the agent takes its
# place; prefix+0 pulls whoever most needs attention. (F-keys, not shift+digit,
# because shift+digit doesn't register on this terminal.)
# type = "shell" runs the helper detached — no visible command pane.
[[keys.command]]
key = "prefix+0"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull next"

[[keys.command]]
key = "prefix+f1"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 1"

[[keys.command]]
key = "prefix+f2"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 2"

[[keys.command]]
key = "prefix+f3"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 3"

[[keys.command]]
key = "prefix+f4"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 4"

[[keys.command]]
key = "prefix+f5"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 5"

[[keys.command]]
key = "prefix+f6"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 6"

[[keys.command]]
key = "prefix+f7"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 7"

[[keys.command]]
key = "prefix+f8"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 8"

[[keys.command]]
key = "prefix+f9"
type = "shell"
command = "/home/qqp/projects/qq/bin/qq-herdr-pull 9"

[ui]
agent_panel_sort = "priority"
